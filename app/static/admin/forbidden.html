<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Familienkalender – Verwaltung</title>
  <!-- Asset-URLs müssen relativ sein, damit die Seite hinter HA-Ingress funktioniert. -->
  <style>
    /* Standalone 403 page: no shared stylesheet, so the dark palette lives
       inline via prefers-color-scheme (follows the system/HA "Auto" theme). */
    :root {
      --bg: #f5f6f8;
      --text: #1f2430;
      --text-muted: #5a6272;
      --accent: #2f6fed;
      --accent-contrast: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161a;
        --text: #e6e8eb;
        --text-muted: #9aa0aa;
        --accent: #5b8cff;
        --accent-contrast: #0b0d10;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      text-align: center;
      padding: 32px;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 8px;
    }
    p {
      margin: 0 0 24px;
      color: var(--text-muted);
    }
    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 10px;
      background: var(--accent);
      color: var(--accent-contrast);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Nur für Administratoren.</h1>
    <p>Die Verwaltung des Familienkalenders ist Home-Assistant-Administratoren vorbehalten.</p>
    <a href="./">&#8249; Zurück zum Kalender</a>
  </main>
</body>
</html>
