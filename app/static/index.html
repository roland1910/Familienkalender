<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Familienkalender</title>
  <!-- Asset-URLs müssen relativ sein, damit die Seite hinter HA-Ingress funktioniert. -->
  <link rel="stylesheet" href="static/css/calendar.css">
  <!-- Theme vor dem ersten Paint anwenden (kein Hell-Aufblitzen im Dark-Mode).
       Bewusst inline und synchron: ein deferred Modul liefe erst nach dem
       Rendern. Der gespeicherte Wert ist untrusted -> nur bekannte Themes,
       sonst "auto" (Media-Query entscheidet). Spiegelt theme-memory.js. -->
  <script>
    (() => {
      try {
        const t = localStorage.getItem("familienkalender.theme.v1");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch {}
    })();
  </script>
</head>
<body>
  <!-- Etappe 39: die Bedienleiste steht senkrecht am RECHTEN Bildschirmrand
       (Rolands Wunsch: "die Leiste … könnte generell am rechten Rand vertikal
       angebracht werden damit würden wir nochmals etwas platz gewinnen").
       Deshalb liegt der Inhalt links (.content) und die Leiste rechts
       daneben; auf schmalen Schirmen kippt das Ganze per Media-Query wieder
       in die alte waagerechte Anordnung oben. -->
  <div class="app">
    <div class="content">
      <!-- Der Titel sitzt kompakt oben links im Inhalt (nicht in der Leiste):
           eine senkrechte Leiste kann "KW 30 · 20.07. – 26.07." nicht lesbar
           aufnehmen, und eine schlanke Titelzeile kostet deutlich weniger
           Höhe als die frühere Button-Zeile. -->
      <div class="content-head">
        <h1 id="period-title" class="period-title">Familienkalender</h1>
        <span id="status-badge" class="status-badge" hidden>Daten nicht aktuell</span>
      </div>
      <main id="calendar" class="calendar">
        <p id="loading" class="loading">Lädt&hellip;</p>
      </main>
      <section id="legend" class="legend" aria-label="Kalender-Legende" hidden></section>
      <section id="power" class="power" hidden aria-label="Strom">
        <p class="loading">Lädt&hellip;</p>
      </section>
      <section id="weather" class="weather" hidden aria-label="Wetter">
        <p class="loading">Lädt&hellip;</p>
      </section>
    </div>
    <header class="toolbar">
      <!-- Gruppe 1: Blättern (nur im Kalender-Modus sichtbar). Die Chevrons
           werden in der senkrechten Leiste per CSS um 90° gedreht, damit
           "zurück" nach oben und "vor" nach unten zeigt. -->
      <div class="toolbar-nav">
        <button id="btn-prev" class="nav-button" type="button" aria-label="Zurück"><span
          class="nav-glyph">&#8249;</span></button>
        <button id="btn-today" class="nav-button nav-button-today" type="button">Heute</button>
        <button id="btn-next" class="nav-button" type="button" aria-label="Vor"><span
          class="nav-glyph">&#8250;</span></button>
      </div>
      <span class="toolbar-divider toolbar-divider-calendar" aria-hidden="true"></span>
      <!-- Gruppe 2: Zeitraum INNERHALB des Kalenders — bewusst eine eigene
           Gruppe, optisch getrennt vom Ansichts-Umschalter darunter. -->
      <div class="view-switch">
        <button id="btn-month" class="view-button active" type="button"
                aria-pressed="true">Monat</button>
        <button id="btn-week" class="view-button" type="button"
                aria-pressed="false">Woche</button>
      </div>
      <span class="toolbar-divider toolbar-divider-calendar" aria-hidden="true"></span>
      <div id="mode-slot" class="mode-slot">
        <!-- Ansichts-Umschalter (Etappe 37): NUR Symbole, kein Text — Roland
             findet die Icons (Kalender/Strom/Wetter) erkennbar und will die
             alte, schlichte Optik zurück (umrandete Buttons wie Monat/Woche,
             aktiv = blau gefüllt). Die Symbole tragen aria-hidden; die
             Schaltfläche benennt sich über aria-label, damit die
             Barrierefreiheit den deutschen Namen ansagt und nicht das Symbol.
             Kein role="group" — die Gruppierung ist rein optisch.
             Etappe 38: die Symbole sind INLINE-SVG statt Emoji — der
             Kiosk-Browser (WebKitGTK) hat keine Schrift für Emoji jenseits
             der BMP und zeigte leere Kästchen. Die Icons stehen in
             static/js/icons.js; main.js füllt jeden data-icon-Platzhalter. -->
        <div class="mode-switch">
          <button id="btn-mode-calendar" class="mode-button active" type="button"
                  aria-pressed="true" aria-label="Kalender" title="Kalender">
            <span class="btn-icon" data-icon="calendar" aria-hidden="true"></span>
          </button>
          <button id="btn-mode-power" class="mode-button" type="button"
                  aria-pressed="false" aria-label="Strom" title="Strom">
            <span class="btn-icon" data-icon="bolt" aria-hidden="true"></span>
          </button>
          <button id="btn-mode-weather" class="mode-button" type="button"
                  aria-pressed="false" aria-label="Wetter" title="Wetter">
            <span class="btn-icon" data-icon="cloud" aria-hidden="true"></span>
          </button>
        </div>
        <span class="toolbar-divider" aria-hidden="true"></span>
        <!-- Theme-Umschalter (pro Gerät, localStorage): zyklisch
             Auto -> Hell -> Dunkel. Auto folgt dem System-/HA-Theme.
             Dreistufig, aber ohne Text (Etappe 37): drei UNTERSCHIEDLICHE
             Symbole (halb gefüllter Kreis = Auto, Sonne = Hell, Mond =
             Dunkel) machen den Zustand ohne Wort erkennbar; aria-label sagt
             ihn zusätzlich an. main.js tauscht das SVG beim Umschalten. -->
        <button id="btn-theme" class="icon-button" type="button"
                aria-label="Farbschema umschalten" title="Farbschema: automatisch">
          <span class="btn-icon" data-icon="theme-auto" aria-hidden="true"></span>
        </button>
        <!-- Bildschirmschoner-Umschalter (pro Gerät, localStorage). Wenn
             aktiv, startet nach Leerlauf die Foto-Diashow. Symbol bewusst
             Bilderrahmen (nicht Kamera): die Kamera sah dem Kalender-Symbol
             des Ansichts-Umschalters am Kiosk zum Verwechseln ähnlich.
             Als reiner Schalter zeigt er seinen Zustand über die Farbe:
             ausgegraut = aus, farbig = an (Etappe 36/37, ohne Wort). -->
        <button id="btn-screensaver" class="icon-button toggle-button" type="button"
                aria-pressed="false" aria-label="Diashow als Bildschirmschoner"
                title="Diashow als Bildschirmschoner">
          <span class="btn-icon" data-icon="picture" aria-hidden="true"></span>
        </button>
        <!-- Standardmäßig versteckt; main.js blendet das Zahnrad nur für
             HA-Admins ein (GET api/me). Der Server schützt /admin zusätzlich. -->
        <a class="nav-button admin-link" href="admin" aria-label="Verwaltung" title="Verwaltung"
           hidden><span class="btn-icon" data-icon="gear" aria-hidden="true"></span></a>
      </div>
    </header>
  </div>
  <div id="day-popover" class="popover-backdrop" hidden></div>
  <script type="module" src="static/js/main.js"></script>
</body>
</html>
