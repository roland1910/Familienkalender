<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Familienkalender</title>
  <!-- Asset-URLs müssen relativ sein, damit die Seite hinter HA-Ingress funktioniert. -->
  <link rel="stylesheet" href="static/css/calendar.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-nav">
      <button id="btn-prev" class="nav-button" type="button" aria-label="Zurück">&#8249;</button>
      <button id="btn-today" class="nav-button nav-button-today" type="button">Heute</button>
      <button id="btn-next" class="nav-button" type="button" aria-label="Vor">&#8250;</button>
    </div>
    <h1 id="period-title" class="period-title">Familienkalender</h1>
    <div class="toolbar-right">
      <span id="status-badge" class="status-badge" hidden>Daten nicht aktuell</span>
      <div class="view-switch">
        <button id="btn-month" class="view-button active" type="button">Monat</button>
        <button id="btn-week" class="view-button" type="button">Woche</button>
      </div>
      <div id="mode-slot" class="mode-slot">
        <div class="mode-switch">
          <button id="btn-mode-calendar" class="view-button active" type="button"
                  aria-label="Kalender" title="Kalender">&#128197;</button>
          <button id="btn-mode-power" class="view-button" type="button"
                  aria-label="Strom" title="Strom">&#9889;</button>
        </div>
        <!-- Standardmäßig versteckt; main.js blendet das Zahnrad nur für
             HA-Admins ein (GET api/me). Der Server schützt /admin zusätzlich. -->
        <a class="nav-button admin-link" href="admin" aria-label="Verwaltung" hidden>&#9881;</a>
      </div>
    </div>
  </header>
  <main id="calendar" class="calendar">
    <p id="loading" class="loading">Lädt&hellip;</p>
  </main>
  <section id="power" class="power" hidden aria-label="Strom">
    <p class="loading">Lädt&hellip;</p>
  </section>
  <div id="day-popover" class="popover-backdrop" hidden></div>
  <script type="module" src="static/js/main.js"></script>
</body>
</html>
