name: Familienkalender
version: "0.29.0"
slug: familienkalender
description: Aggregierter Familienkalender für die HA-Seitenleiste und das Touch-Display
url: https://github.com/roland1910/Familienkalender
arch:
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
# Direkter Zugriff am Ingress vorbei — ausschließlich für das Kalender-Abo
# (GET /feed/<token>.ics, Token ist dort die einzige Auth). Der Feed läuft
# als eigener TLS-Listener (app/serve.py -> app/feed_app.py) auf
# Container-Port 8100: auf diesem Port ist nichts anderes gebunden. Der
# Router darf extern 8098 auf den Host-Port 8098 weiterleiten
# (https://rnd.ignorelist.com:8098/...).
ports:
  8100/tcp: 8098
ports_description:
  8100/tcp: "Kalender-Abo (ICS-Feed, HTTPS, Token-geschützt) — extern freigebbar"
# Read-only access to the HA SSL directory: the feed listener serves the
# Let's Encrypt certificate (fullchain.pem/privkey.pem) directly.
# Read-only access to /media: the photo slideshow reads image files from
# the CIFS network share mounted there (see app/slideshow.py). Read-only —
# the add-on never writes to the share.
map:
  - ssl:ro
  - media:ro
# Certificate file paths for the feed listener (paths, not secrets).
options:
  ssl_certfile: /ssl/fullchain.pem
  ssl_keyfile: /ssl/privkey.pem
schema:
  ssl_certfile: str
  ssl_keyfile: str
# Needed for the power view: /api/power reads sensor states from the HA Core
# API (http://supervisor/core/api with the SUPERVISOR_TOKEN). Was removed in
# the stage-1 security review while nothing used it — the need is here now.
homeassistant_api: true
panel_icon: mdi:calendar-heart
panel_title: Familienkalender
# Show the sidebar entry to non-admin HA users too (default is true =
# admins only). The admin area stays protected server-side: /admin and
# /api/admin/* check the ingress user headers (see app/auth.py).
panel_admin: false
